<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cảm Ơn Quý Khách - Sơn Lotus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .bg-surface { background-color: #1a1a1a; }
    </style>
</head>
<body class="bg-[#111111] text-white h-screen flex flex-col">
    <div class="flex-grow relative flex items-center justify-center p-6">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0">
            <img src="https://w.ladicdn.com/s1450x850/5e3e73f71adefa2bf15bd42f/z5638708846399_a3d0ae8ecf77d341b52f6f5bb39a8af5-20240718042457-y7a0y.jpg" class="w-full h-full object-cover opacity-40 mix-blend-luminosity" alt="Sơn Lotus Background">
            <div class="absolute inset-0 bg-black/60"></div>
        </div>

        <!-- Thank You Message -->
        <div class="relative z-10 text-center max-w-2xl bg-surface/80 p-12 lg:p-16 border border-white/10 rounded-sm backdrop-blur-sm">
            <!-- Icon -->
            <div class="mx-auto w-20 h-20 bg-[#e9c349]/10 rounded-full flex items-center justify-center mb-8">
                <svg class="w-10 h-10 text-[#e9c349]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h1 class="text-3xl lg:text-4xl font-bold text-[#e9c349] mb-6 uppercase tracking-wider">Xin chân thành cám ơn!</h1>
            <p class="text-lg lg:text-xl text-white/80 leading-relaxed mb-10">
                Chúng tôi đã nhận được yêu cầu của Quý khách hàng. Sơn Lotus sẽ xem qua và phản hồi sớm nhất cho Quý khách.
            </p>
            <a href="index.html" class="inline-block bg-[#e9c349] text-black px-8 py-4 font-bold uppercase tracking-widest text-sm hover:bg-white transition-colors duration-300">
                Trở Về Trang Chủ
            </a>
        </div>
    </div>
</body>
</html>
